<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #screen { width: 100%; height: 100%; overflow: hidden; }
  #screen canvas { width: 100% !important; }
  #status {
    position: fixed; bottom: 0; left: 0; right: 0;
    text-align: center; padding: 8px;
    font: 12px/1 -apple-system, sans-serif;
    color: #888; background: rgba(0,0,0,0.7);
    transition: opacity 0.3s;
    z-index: 10;
  }
  #status.connected { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="screen"></div>
<div id="status">Connecting...</div>
<script type="module">
  import RFB from './lib/rfb.js?v=2';

  const params = new URLSearchParams(window.location.search);
  const password = params.get('password') || '';
  const host = params.get('host') || window.location.hostname;
  const port = params.get('port') || window.location.port;
  const path = params.get('path') || 'websockify';
  const statusEl = document.getElementById('status');
  const screenEl = document.getElementById('screen');

  const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${host}${port ? ':' + port : ''}/${path}`;

  let rfb = null;
  let reconnectTimer = null;
  let resizeObs = null;

  function notifyParent(state) {
    try { window.parent.postMessage({ type: 'novnc-state', state }, '*'); } catch {}
  }

  function clearScreen() {
    while (screenEl.firstChild) screenEl.removeChild(screenEl.firstChild);
  }

  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (rfb) { try { rfb.disconnect(); } catch {} rfb = null; }
    if (resizeObs) { resizeObs.disconnect(); resizeObs = null; }
    clearScreen();

    statusEl.textContent = 'Connecting\u2026';
    statusEl.classList.remove('connected');
    notifyParent('connecting');

    rfb = new RFB(screenEl, url, {
      credentials: { password },
      wsProtocols: ['binary'],
    });

    rfb.scaleViewport = false;
    rfb.resizeSession = false;

    const display = rfb._display;

    // Override noVNC's _rescale — it fights our fitToWidth by setting
    // inline width/height on the canvas. We keep _scale for internal use only.
    display._rescale = function(factor) {
      this._scale = factor;
    };

    // Fit canvas to container width, maintain aspect ratio for height.
    function fitToWidth() {
      const canvas = screenEl.querySelector('canvas');
      if (!canvas) return;
      const fbW = display._fbWidth || canvas.width;
      const fbH = display._fbHeight || canvas.height;
      if (!fbW || !fbH) return;
      const containerW = screenEl.clientWidth;
      canvas.style.width = containerW + 'px';
      canvas.style.height = Math.round(containerW * fbH / fbW) + 'px';
    }

    resizeObs = new ResizeObserver(fitToWidth);
    resizeObs.observe(screenEl);

    // Patch mouse coordinate mapping to use actual rendered canvas size.
    display.absX = function(x) {
      const rect = this._target.getBoundingClientRect();
      if (rect.width === 0) return 0;
      return Math.round(x / rect.width * this._fbWidth + this._viewportLoc.x);
    };
    display.absY = function(y) {
      const rect = this._target.getBoundingClientRect();
      if (rect.height === 0) return 0;
      return Math.round(y / rect.height * this._fbHeight + this._viewportLoc.y);
    };

    rfb.addEventListener('connect', () => {
      statusEl.textContent = 'Connected';
      statusEl.classList.add('connected');
      notifyParent('connected');
      fitToWidth();
    });

    rfb.addEventListener('disconnect', (e) => {
      const msg = e.detail.clean ? 'Reconnecting\u2026' : 'Connection lost \u2014 reconnecting\u2026';
      statusEl.textContent = msg;
      statusEl.classList.remove('connected');
      notifyParent('disconnected');
      scheduleReconnect();
    });

    rfb.addEventListener('credentialsrequired', () => {
      rfb.sendCredentials({ password });
    });
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect();
    }, 3000);
  }

  connect();
</script>
</body>
</html>
